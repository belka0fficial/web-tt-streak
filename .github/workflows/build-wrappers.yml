name: Build Android APK + iOS IPA

on:
  release:
    types: [published]

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build APK
        working-directory: wrappers/android
        run: gradle assembleRelease

      - name: Rename APK
        run: mv wrappers/android/app/build/outputs/apk/release/app-release-unsigned.apk StreakSaver.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: StreakSaver.apk

  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: wrappers/ios
        run: xcodegen generate

      - name: Build unsigned IPA
        working-directory: wrappers/ios
        run: |
          xcodebuild \
            -project StreakSaver.xcodeproj \
            -scheme StreakSaver \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # Package the .app into an IPA
          APP=$(find build -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r StreakSaver.ipa Payload
          rm -rf Payload

      - name: Upload IPA to release
        uses: softprops/action-gh-release@v2
        with:
          files: wrappers/ios/StreakSaver.ipa
